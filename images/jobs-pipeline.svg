<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" width="520" height="260" role="img" aria-label="Jobs pipeline diagram: multiple portal APIs to normalize and classify, to SQLite, to the dashboard">
<rect width="520" height="260" fill="#f4f6f9"/>
<style>
  .lbl { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 11px; font-weight: 500; fill: #171b24; }
  .cap { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 8px; fill: #79818f; }
  .box { fill: #ffffff; stroke: #dde1e8; stroke-width: 1.5; }
  .box-on { fill: #e7eefe; stroke: #2f6bed; stroke-width: 1.5; }
  .src { fill: #ffffff; stroke: #dde1e8; stroke-width: 1.2; }
  .arr { stroke: #79818f; stroke-width: 1.4; }
</style>
<!-- fan-in of portal sources -->
<rect class="box-on" x="24" y="70"  width="84" height="26" rx="6"/>
<text class="lbl" x="66" y="87" text-anchor="middle" fill="#1f52c9">gupy</text>
<rect class="src" x="24" y="102" width="84" height="24" rx="6"/>
<text class="cap" x="66" y="117" text-anchor="middle">the muse</text>
<rect class="src" x="24" y="132" width="84" height="24" rx="6"/>
<text class="cap" x="66" y="147" text-anchor="middle">+ 6 boards remotos</text>
<rect class="src" x="24" y="162" width="84" height="24" rx="6"/>
<text class="cap" x="66" y="177" text-anchor="middle">8 apis públicas</text>
<!-- fan-in arrows -->
<line class="arr" x1="112" y1="83"  x2="150" y2="122"/>
<line class="arr" x1="112" y1="114" x2="150" y2="124"/>
<line class="arr" x1="112" y1="144" x2="150" y2="128"/>
<line class="arr" x1="112" y1="174" x2="150" y2="132"/>
<path d="M150 127 l-7 -2 v6 z" fill="#79818f"/>
<!-- normalize -->
<rect class="box" x="154" y="106" width="92" height="48" rx="8"/>
<text class="lbl" x="200" y="127" text-anchor="middle">normalize</text>
<text class="cap" x="200" y="141" text-anchor="middle">+ classifica</text>
<line class="arr" x1="250" y1="130" x2="274" y2="130"/><path d="M274 130 l-6 -3 v6 z" fill="#79818f"/>
<!-- sqlite -->
<rect class="box" x="278" y="106" width="84" height="48" rx="8"/>
<text class="lbl" x="320" y="127" text-anchor="middle">sqlite</text>
<text class="cap" x="320" y="141" text-anchor="middle">90 dias</text>
<line class="arr" x1="366" y1="130" x2="390" y2="130"/><path d="M390 130 l-6 -3 v6 z" fill="#79818f"/>
<!-- dashboard -->
<rect class="box" x="394" y="106" width="98" height="48" rx="8"/>
<text class="lbl" x="443" y="127" text-anchor="middle">dashboard</text>
<text class="cap" x="443" y="141" text-anchor="middle">filtros + charts</text>
</svg>
