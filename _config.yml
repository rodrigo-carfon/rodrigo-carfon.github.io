title: Rodrigo Carvalho
# jekyll-seo-tag builds the home's <title> as "title | tagline". Without a
# tagline it falls back to the whole description, which overflows the tab and
# the search result.
tagline: Data &amp; Analytics Engineering
author: Rodrigo Carvalho
lang: en-US
url: https://rodrigo-carfon.github.io

# Plain text, ~140 chars: this is the <meta name="description"> and nothing else.
# The hero lives in index.md.
description: >-
  Statistician (UNICAMP) building data pipelines — ingestion, orchestration,
  modeling and delivery with Python, SQL, n8n, Docker and Power BI.

# jekyll-seo-tag is NOT in the GitHub Pages default plugin set. It only resolved
# before because the (now removed) remote theme pulled it in. {% seo %} in
# _layouts/default.html fails the build without this line.
plugins:
  - jekyll-seo-tag

# The ETL project is browsable on GitHub; no need to serve its .py/.db/.pbip.
exclude:
  - commodity-risk-dashboard/
  - README.md
  - LICENSE
